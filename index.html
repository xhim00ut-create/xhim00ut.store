<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XHIM00UT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:#fff;
  color:#111;
  scroll-behavior:smooth;
}

/* NAV */
nav{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  border-bottom:1px solid #eee;
  background:#fff;
}

nav img{
  width:360px;
  margin-bottom:10px;
}

.nav-links{
  display:flex;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:#111;
  font-size:13px;
}

/* CART */
.cart-icon{
  position:fixed;
  right:20px;
  top:20px;
  font-size:22px;
  cursor:pointer;
  z-index:9999;
}

.cart-count{
  position:absolute;
  top:0;
  right:-10px;
  background:#E9C589;
  color:#111;
  font-size:10px;
  width:18px;
  height:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:50%;
  font-weight:600;
}

/* HERO */
.hero{
  height:75vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  width:420px;
  max-width:95%;
  margin-bottom:10px;
  animation: floatLogo 4s ease-in-out infinite;
}

.hero h1{
  font-size:16px;
  letter-spacing:3px;
  opacity:0.8;
}

.hero p{
  margin-top:10px;
  margin-bottom:20px;
  font-size:14px;
}

.shop-btn{
  background:#E9C589;
  color:#111;
  padding:10px 18px;
  text-decoration:none;
  font-size:12px;
  letter-spacing:2px;
}

/* SECTIONS */
.section{
  padding:30px;
}

/* 🔥 FIXED TITLE CENTERING */
.title{
  display:block;
  width:fit-content;
  margin:0 auto 25px auto;
  text-align:center;
  font-size:26px;
  padding:6px 16px;
  border-radius:10px;
  background:#fff;
  box-shadow:0 6px 18px rgba(233, 197, 137, 0.35);
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  border:1px solid #eee;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  text-align:center;
  background:#fff;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  border-radius:10px;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
  width:250px;
}

.size-btn{
  display:block;
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  background:#E9C589;
  cursor:pointer;
  font-weight:500;
}

/* FLOAT */
@keyframes floatLogo{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0px);}
}

/* SCROLL ANIMATION */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<nav class="reveal">
  <img src="toplogo.jpg">

  <div class="nav-links">
    <a href="#home">HOME</a>
    <a href="#products">SHOP</a>
    <a href="#coming">COMING SOON</a>
    <a href="#photoshoot">PHOTOSHOOT</a>
  </div>
</nav>

<div class="cart-icon" onclick="openCheckout()">
  🛒
  <div class="cart-count" id="cartCount">0</div>
</div>

<!-- HERO -->
<section class="hero reveal" id="home">
  <img src="middlelogo.JPEG">
  <h1>XHIM00UT</h1>
  <p>Minimal. Bold. Streetwear Energy.</p>

  <a class="shop-btn" href="#products">SHOP NOW</a>
</section>

<!-- PRODUCTS -->
<section class="section reveal" id="products">
  <h2 class="title">New Drops</h2>

  <div class="products">
    <div class="card" onclick="openPopup('Black Tee')">
      <img src="black.JPG">
      <h3>Black Tee</h3>
      <p>R250</p>
    </div>

    <div class="card" onclick="openPopup('White Tee')">
      <img src="white.JPG">
      <h3>White Tee</h3>
      <p>R250</p>
    </div>

    <div class="card" onclick="openPopup('Grey Tee')">
      <img src="grey.JPG">
      <h3>Grey Tee</h3>
      <p>R250</p>
    </div>
  </div>
</section>

<!-- COMING SOON -->
<section class="section reveal" id="coming">
  <h2 class="title">Coming Soon</h2>

  <div class="products">
    <div class="card">
      <img src="suit.jpeg">
      <h3>Tracksuit</h3>
      <p>Coming Soon</p>
    </div>

    <div class="card">
      <img src="grill.jpg">
      <h3>Grills</h3>
      <p>Coming Soon</p>
    </div>

    <div class="card">
      <img src="jacket.jpeg">
      <h3>Leather Jacket</h3>
      <p>Coming Soon</p>
    </div>
  </div>
</section>

<!-- PHOTOSHOOT -->
<section class="section reveal" id="photoshoot">
  <h2 class="title">Photoshoot</h2>

  <img src="photoshoot.jpeg" style="width:90%;max-width:500px;border-radius:12px;display:block;margin:0 auto;box-shadow:0 10px 30px rgba(0,0,0,0.1);">
</section>

<script>
let cart = [];
let selectedItem = "";

function openPopup(item){
  selectedItem = item;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function addToCart(size){
  cart.push(selectedItem + " (" + size + ")");
  document.getElementById("cartCount").innerText = cart.length;
  closePopup();
}

function openCheckout(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  const number = "27646481464";
  const message = "Hi I want to order:\n" + cart.join("\n");
  const url = `https://wa.me/${number}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

/* scroll reveal */
function revealOnScroll(){
  document.querySelectorAll(".reveal").forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("active");
    }
  });
}

window.addEventListener("scroll", revealOnScroll);
window.addEventListener("load", revealOnScroll);
</script>

</body>
</html>
